name: Java Microservices Path CI

on:
  push:
    branches:
      - main
      #- master
    paths:
      - "appointment-service/**"
      - "doctor-service/**"
      - "patient-service/**"
      - "report-service/**"
      - "user-service/**"
      - ".github/workflows/java-services-path-ci.yml"
  pull_request:
    paths:
      - "appointment-service/**"
      - "doctor-service/**"
      - "patient-service/**"
      - "report-service/**"
      - "user-service/**"
      - ".github/workflows/java-services-path-ci.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  JAVA_VERSION: "17"
  SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION || github.repository_owner }}

jobs:
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      services: ${{ steps.service-matrix.outputs.services }}
      service_count: ${{ steps.service-matrix.outputs.service_count }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        timeout-minutes: 5

      - name: Detect changed service paths
        id: filter
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: dorny/paths-filter@v3
        timeout-minutes: 3
        with:
          filters: |
            appointment-service:
              - "appointment-service/**"
              - ".github/workflows/java-services-path-ci.yml"
            doctor-service:
              - "doctor-service/**"
              - ".github/workflows/java-services-path-ci.yml"
            patient-service:
              - "patient-service/**"
              - ".github/workflows/java-services-path-ci.yml"
            report-service:
              - "report-service/**"
              - ".github/workflows/java-services-path-ci.yml"
            user-service:
              - "user-service/**"
              - ".github/workflows/java-services-path-ci.yml"

      - name: Build service matrix
        id: service-matrix
        timeout-minutes: 1
        env:
          CHANGED_SERVICES: ${{ steps.filter.outputs.changes }}
          SERVICE_COUNT: ${{ steps.filter.outputs.count }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo 'services=["appointment-service","doctor-service","patient-service","report-service","user-service"]' >> "$GITHUB_OUTPUT"
            echo 'service_count=5' >> "$GITHUB_OUTPUT"
          else
            echo "services=${CHANGED_SERVICES:-[]}" >> "$GITHUB_OUTPUT"
            echo "service_count=${SERVICE_COUNT:-0}" >> "$GITHUB_OUTPUT"
          fi

  unit-test:
    name: Unit tests - ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.service_count != '0' }}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        timeout-minutes: 5

      - name: Set up JDK
        uses: actions/setup-java@v4
        timeout-minutes: 5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run unit tests
        timeout-minutes: 10
        run: mvn -B -ntp test

  sonar:
    name: Sonar analysis - ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - detect-changes
      - unit-test
    if: ${{ needs.detect-changes.outputs.service_count != '0' }}
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        timeout-minutes: 5

      - name: Set up JDK
        uses: actions/setup-java@v4
        timeout-minutes: 5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run tests and Sonar analysis
        if: ${{ env.SONAR_TOKEN != '' }}
        timeout-minutes: 15
        run: >
          mvn -B -ntp verify sonar:sonar
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
          -Dsonar.projectKey=${{ env.SONAR_ORGANIZATION }}_${{ matrix.service }}
          -Dsonar.projectName=${{ matrix.service }}

      - name: Skip Sonar analysis
        if: ${{ env.SONAR_TOKEN == '' }}
        timeout-minutes: 1
        run: echo "SONAR_TOKEN is not configured; skipping Sonar analysis."

  docker-build:
    name: Docker build - ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - detect-changes
      - unit-test
    if: ${{ needs.detect-changes.outputs.service_count != '0' }}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        timeout-minutes: 5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        timeout-minutes: 5

      - name: Build service image
        timeout-minutes: 15
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: false
          tags: healthcare/${{ matrix.service }}:ci
