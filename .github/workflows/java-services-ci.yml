name: Java Microservices CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  JAVA_VERSION: "17"
  SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION || github.repository_owner }}

jobs:
  unit-test:
    name: Unit tests - ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        service:
          - appointment-service
          - doctor-service
          - patient-service
          - report-service
          - user-service
    defaults:
      run:
        working-directory: healthcare-microservices/${{ matrix.service }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        timeout-minutes: 5

      - name: Set up JDK
        uses: actions/setup-java@v4
        timeout-minutes: 5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run unit tests
        timeout-minutes: 10
        run: mvn -B -ntp test

  sonar:
    name: Sonar analysis - ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: unit-test
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        service:
          - appointment-service
          - doctor-service
          - patient-service
          - report-service
          - user-service
    defaults:
      run:
        working-directory: healthcare-microservices/${{ matrix.service }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        timeout-minutes: 5

      - name: Set up JDK
        uses: actions/setup-java@v4
        timeout-minutes: 5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run tests and Sonar analysis
        if: ${{ env.SONAR_TOKEN != '' }}
        timeout-minutes: 15
        run: >
          mvn -B -ntp verify sonar:sonar
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
          -Dsonar.projectKey=${{ env.SONAR_ORGANIZATION }}_${{ matrix.service }}
          -Dsonar.projectName=${{ matrix.service }}

      - name: Skip Sonar analysis
        if: ${{ env.SONAR_TOKEN == '' }}
        timeout-minutes: 1
        run: echo "SONAR_TOKEN is not configured; skipping Sonar analysis."

  docker-build:
    name: Docker build - ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: unit-test
    strategy:
      fail-fast: false
      matrix:
        service:
          - appointment-service
          - doctor-service
          - patient-service
          - report-service
          - user-service
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        timeout-minutes: 5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        timeout-minutes: 5

      - name: Build service image
        timeout-minutes: 15
        uses: docker/build-push-action@v6
        with:
          context: ./healthcare-microservices/${{ matrix.service }}
          push: false
          tags: healthcare/${{ matrix.service }}:ci
